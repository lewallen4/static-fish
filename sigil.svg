<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .static-dot { fill: #c9d1d9; opacity: 0.3; }
    .core { stroke: #79c0ff; stroke-width: 1.5; fill: none; }
    .fish { stroke: #c9d1d9; stroke-width: 1.2; fill: none; }
    .prism-line { stroke: #2a2f3a; stroke-width: 0.8; }
  </style>

  <!-- Background static (tiny dots) -->
  <circle cx="120" cy="130" r="1" class="static-dot" />
  <circle cx="280" cy="110" r="1" class="static-dot" />
  <circle cx="190" cy="290" r="1.2" class="static-dot" />
  <circle cx="310" cy="260" r="0.8" class="static-dot" />
  <circle cx="70" cy="220" r="1" class="static-dot" />
  <circle cx="340" cy="180" r="1.1" class="static-dot" />
  <circle cx="150" cy="340" r="0.9" class="static-dot" />
  <circle cx="250" cy="50" r="1" class="static-dot" />
  <circle cx="50" cy="320" r="1" class="static-dot" />
  <circle cx="360" cy="310" r="1" class="static-dot" />

  <!-- Outer circle (time loop, slightly open) -->
  <path d="M200 50 C 280 50, 340 110, 340 200 C 340 280, 280 340, 200 340 C 120 340, 60 280, 60 200 C 60 130, 110 70, 180 55" stroke="#2a2f3a" stroke-width="1.2" fill="none" stroke-dasharray="3 2" />

  <!-- Prism facets (abstract geometric) -->
  <polygon points="200,130 260,180 240,250 160,250 140,180 200,130" stroke="#79c0ff" stroke-width="1" fill="none" stroke-opacity="0.6" />
  <line x1="200" y1="130" x2="200" y2="250" class="prism-line" />
  <line x1="140" y1="180" x2="260" y2="180" class="prism-line" />
  <line x1="160" y1="250" x2="240" y2="250" class="prism-line" />

  <!-- Lantern / light core -->
  <circle cx="200" cy="190" r="15" stroke="#ffa657" stroke-width="1.5" fill="none" stroke-dasharray="2 2" />
  <circle cx="200" cy="190" r="6" fill="#ffa657" fill-opacity="0.2" />

  <!-- Static fish (two, stylized) -->
  <!-- Fish 1 (left) -->
  <path d="M110 150 Q 90 140, 70 150 Q 90 160, 110 150" stroke="#c9d1d9" stroke-width="1" fill="none" />
  <path d="M70 150 L 55 145 L 55 155 L 70 150" stroke="#c9d1d9" stroke-width="1" fill="none" />
  <circle cx="100" cy="147" r="1.5" fill="#c9d1d9" fill-opacity="0.5" />

  <!-- Fish 2 (right) -->
  <path d="M290 250 Q 310 240, 330 250 Q 310 260, 290 250" stroke="#c9d1d9" stroke-width="1" fill="none" />
  <path d="M330 250 L 345 245 L 345 255 L 330 250" stroke="#c9d1d9" stroke-width="1" fill="none" />
  <circle cx="300" cy="247" r="1.5" fill="#c9d1d9" fill-opacity="0.5" />

  <!-- Bench (horizontal line with two verticals) -->
  <line x1="140" y1="320" x2="260" y2="320" stroke="#c9d1d9" stroke-width="1.2" stroke-dasharray="3 2" />
  <line x1="170" y1="320" x2="170" y2="340" stroke="#c9d1d9" stroke-width="1" stroke-dasharray="2 2" />
  <line x1="230" y1="320" x2="230" y2="340" stroke="#c9d1d9" stroke-width="1" stroke-dasharray="2 2" />

  <!-- Tiny static fish (hidden in the static) -->
  <path d="M320 90 Q 330 85, 340 90 Q 330 95, 320 90" stroke="#c9d1d9" stroke-width="0.6" fill="none" opacity="0.3" />
  <path d="M80 280 Q 90 275, 100 280 Q 90 285, 80 280" stroke="#c9d1d9" stroke-width="0.6" fill="none" opacity="0.3" />
</svg>